<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reservation Delicious Bites</title>

<style>
:root {
    --primary: #ff7a18;
    --glass: rgba(255,255,255,0.08);
}

* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body {
    background:#0f0f0f;
    color:white;
}

/* NAVBAR */
header {
    position:fixed;
    width:100%;
    top:0;
    display:flex;
    justify-content:space-between;
    padding:15px 50px;
    backdrop-filter: blur(10px);
    background:rgba(0,0,0,0.5);
    z-index:1000;
}

header h1 { color:var(--primary); }

nav a {
    margin:0 15px;
    text-decoration:none;
    color:#ddd;
}

nav a:hover { color:white; }

/* HERO */
.hero {
    height:50vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
    url('https://images.unsplash.com/photo-1414235077428-338989a2e8c0') center/cover;
}

.hero h2 {
    font-size:40px;
}

/* FORM */
.reservation {
    display:flex;
    justify-content:center;
    padding:80px 20px;
}

.form-box {
    background:var(--glass);
    backdrop-filter: blur(15px);
    padding:30px;
    border-radius:20px;
    width:350px;
}

.form-box h3 {
    text-align:center;
    margin-bottom:20px;
    color:var(--primary);
}

.input-group {
    margin-bottom:15px;
}

input {
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
}

/* BUTTON */
button {
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:var(--primary);
    color:white;
    cursor:pointer;
}

button:hover {
    background:#ff5500;
}

/* FOOTER */
footer {
    text-align:center;
    padding:20px;
    background:#000;
}

/* PIZZA LOADER */
#loader {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#0f0f0f;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:2000;
    display: none;
}

#loader p {
    color: var(--primary);
    margin-top:15px;
    font-size:18px;
}

.pizza {
    width:80px;
    height:80px;
    border-radius:50%;
    background:orange;
    position:relative;
    animation: spin 1s linear infinite;
}

.pizza::before {
    content:"";
    width:10px;
    height:10px;
    background:red;
    position:absolute;
    top:20px;
    left:20px;
    border-radius:50%;
    box-shadow: 20px 10px red, 10px 30px red;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

/* CUSTOM NOTIFICATION */
.notification-bar {
    position: fixed;
    top: -100px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--primary);
    color: white;
    padding: 15px 30px;
    border-radius: 0 0 15px 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    z-index: 3000;
    transition: top 0.5s ease;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 10px;
}

.notification-bar.show {
    top: 0;
}

.notification-bar .icon {
    font-size: 20px;
}

/* RESPONSIVE */
@media(max-width:768px){
    header { 
        padding:10px 20px; 
        flex-direction: column;
        align-items: center;
        position: static;
    }
    header h1 { font-size: 24px; margin-bottom: 10px; }
    nav { display: flex; flex-wrap: wrap; justify-content: center; }
    nav a { margin: 5px 10px; font-size: 14px; }
    .hero { height: 40vh; }
    .hero h2 { font-size: 28px; }
    .reservation { padding: 40px 15px; }
    .form-box { width: 100%; max-width: 350px; }
}
</style>
</head>

<body>

<header>
    <h1>Delicious Bites</h1>
    <nav>
        <a href="#" onclick="goToPage('index.html')">Home</a>
        <a href="#" onclick="goToPage('about.html')">About</a>
        <a href="#" onclick="goToPage('reservation.html')">Reservation</a>
        <a href="#" onclick="goToPage('transactions.html')">Transactions</a>
        <a href="#" onclick="goToPage('menu.html')">Menu</a>
        <a href="#" onclick="goToPage('contact.html')">Contact Us</a>
        <a href="#" onclick="logout()">Logout</a>
    </nav>
</header>

<section class="hero">
    <h2>Reserve Your Table</h2>
</section>

<section class="reservation">
    <div class="form-box">
        <h3>Book via WhatsApp</h3>

        <div class="input-group">
            <input type="text" id="name" placeholder="Full Name">
        </div>

        <div class="input-group">
            <input type="date" id="date">
        </div>

        <div class="input-group">
            <input type="time" id="time" min="09:00" max="20:00">
        </div>

        <div class="input-group">
            <input type="number" id="guests" placeholder="Number of Guests">
        </div>

        <button onclick="sendWhatsApp()">Reserve Now</button>
    </div>
</section>

<!-- PIZZA LOADER -->
<div id="loader">
  <div class="pizza"></div>
  <p>Delicious Bites...</p>
</div>

<!-- CUSTOM NOTIFICATION BAR -->
<div id="notificationBar" class="notification-bar">
    <span class="icon">🔔</span>
    <span id="notificationMessage"></span>
</div>

<footer>
    <p>© 2026 Delicious Bites</p>
</footer>

<script>
// SET MIN DATE (NO PAST DATE)
const today = new Date().toISOString().split("T")[0];
document.getElementById("date").setAttribute("min", today);

function showNotification(message) {
    const bar = document.getElementById("notificationBar");
    const msg = document.getElementById("notificationMessage");
    msg.innerText = message;
    bar.classList.add("show");
    setTimeout(() => {
        bar.classList.remove("show");
    }, 3000);
}

// WHATSAPP FUNCTION
function sendWhatsApp() {
    const name = document.getElementById("name").value.trim();
    const date = document.getElementById("date").value;
    const time = document.getElementById("time").value;
    const guests = document.getElementById("guests").value;

    if (!name || !date || !time || !guests) {
        showNotification("Please fill all fields");
        return;
    }

    // CHECK DATE
    const selectedDate = new Date(date);
    const todayCheck = new Date();
    todayCheck.setHours(0,0,0,0);

    if (selectedDate < todayCheck) {
        showNotification("You cannot select a past date");
        return;
    }

    // CHECK TIME (9AM - 8PM)
    const [hours, minutes] = time.split(":").map(Number);
    if (hours < 9 || hours > 20 || (hours === 20 && minutes > 0)) {
        showNotification("Reservation time must be between 9:00 AM and 8:00 PM");
        return;
    }

    // SHOW PIZZA LOADER
    document.getElementById("loader").style.display = "flex";

    setTimeout(() => {
        const phone = "233558627995"; 
        const message = `Hello, I want to make a reservation:

Name: ${name}
Date: ${date}
Time: ${time}
Guests: ${guests}`;

        const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
        window.open(url, "_blank");

        // HIDE PIZZA LOADER
        document.getElementById("loader").style.display = "none";
    }, 1500); // 1.5 seconds
}

// LOGOUT
function logout() {
    localStorage.removeItem("currentUser");
    showNotification("Logged out!");
    setTimeout(() => {
        goToPage("login.html");
    }, 1000);
}

function goToPage(url) {
    document.getElementById("loader").style.display = "flex";
    setTimeout(() => {
        window.location.href = url;
    }, 1500);
}
</script>

</body>
</html>
