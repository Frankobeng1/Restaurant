<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout Delicious Bites</title>

<style>
:root { --primary:#ff7a18; }

body { background:#0f0f0f; color:white; font-family:Segoe UI; }

header {
    display:flex;
    justify-content:space-between;
    padding:15px 40px;
    background:#000;
}

.container { padding:40px; max-width:800px; margin:auto; }

.cart-item {
    display:flex;
    justify-content:space-between;
    background:#1a1a1a;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
}

.form-group { margin-top:20px; display:flex; flex-direction:column; }

input, select {
    padding:10px;
    border-radius:8px;
    border:none;
    background:#222;
    color:white;
}

button {
    margin-top:20px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#ff7a18,#ffb347);
    color:white;
    cursor:pointer;
}

.receipt {
    background:#181818;
    padding:20px;
    border-radius:12px;
    margin-top:30px;
    text-align:center;
}

.receipt h3 { color: #ff7a18; }

/* PIZZA LOADER */
#loader {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#0f0f0f;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:2000;
    display: none;
}

#loader p {
    color: var(--primary);
    margin-top:15px;
    font-size:18px;
}

.pizza {
    width:80px;
    height:80px;
    border-radius:50%;
    background:orange;
    position:relative;
    animation: spin 1s linear infinite;
}

.pizza::before {
    content:"";
    width:10px;
    height:10px;
    background:red;
    position:absolute;
    top:20px;
    left:20px;
    border-radius:50%;
    box-shadow: 20px 10px red, 10px 30px red;
}

@keyframes spin { 100% { transform: rotate(360deg); } }

/* CUSTOM NOTIFICATION */
.notification-bar {
    position: fixed;
    top: -100px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--primary);
    color: white;
    padding: 15px 30px;
    border-radius: 0 0 15px 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    z-index: 3000;
    transition: top 0.5s ease;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 10px;
}

.notification-bar.show {
    top: 0;
}

.notification-bar .icon {
    font-size: 20px;
}

/* RESPONSIVE */
@media(max-width:768px){
    header { 
        padding:15px 20px; 
        flex-direction: column;
        align-items: center;
    }
    header h1 { font-size: 24px; margin-bottom: 10px; }
    .container { padding: 20px 15px; }
    .cart-item { flex-direction: column; text-align: center; gap: 5px; }
    .receipt { padding: 15px; border-radius: 8px; }
    .receipt h2 { font-size: 20px; }
    .receipt p { font-size: 14px; }
}
</style>
</head>

<body>

<header>
<h1>💳 Checkout</h1>
<div>
    <a href="#" onclick="goToPage('cart.html')" style="color:white;text-decoration:none;">← Back</a>
    <a href="#" onclick="logout()" style="color:white;text-decoration:none;margin-left:20px;">Logout</a>
</div>
</header>

<div class="container">

<div id="cartContainer"></div>
<div id="total"></div>

<div id="paymentForm">

<div class="form-group">
<label>Name</label>
<input type="text" id="name">
</div>

<div class="form-group">
<label>Phone</label>
<input type="tel" id="phone" maxlength="10">
</div>

<div class="form-group">
<label>Location (Sunyani)</label>
<select id="location">
<option value="">Select</option>
<option>Abesim</option>
<option>Penkwase</option>
<option>Fiapre</option>
<option>Estate</option>
<option>Zongo</option>
<option>Odomase</option>
</select>
</div>

<button onclick="checkout()">Confirm Order</button>

</div>

<div id="receiptContainer"></div>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function showNotification(message) {
    const bar = document.getElementById("notificationBar");
    const msg = document.getElementById("notificationMessage");
    msg.innerText = message;
    bar.classList.add("show");
    setTimeout(() => {
        bar.classList.remove("show");
    }, 3000);
}

function logout() {
    localStorage.removeItem("currentUser");
    showNotification("Logged out!");
    setTimeout(() => {
        goToPage("login.html");
    }, 1000);
}

/* 💰 DELIVERY + TIME DATA */
const deliveryData = {
    "Abesim": { fee:10, time:25, branch:"Abesim Branch" },
    "Penkwase": { fee:8, time:20, branch:"Central Branch" },
    "Fiapre": { fee:12, time:30, branch:"Fiapre Branch" },
    "Estate": { fee:9, time:22, branch:"Central Branch" },
    "Zongo": { fee:8, time:18, branch:"Central Branch" },
    "Odomase": { fee:15, time:35, branch:"Odomase Branch" }
};

/* Display cart */
function displayCart(){
    let total = 0, html = "";

    cart.forEach(item=>{
        total += item.price * item.quantity;
        html += `<div class="cart-item">
        <p>${item.name} x${item.quantity}</p>
        <p>GH₵ ${item.price * item.quantity}</p>
        </div>`;
    });

    document.getElementById("cartContainer").innerHTML = html;
    document.getElementById("total").innerText = "Subtotal: GH₵ " + total;
}
displayCart();

/* Checkout */
function checkout(){
    let name = document.getElementById("name").value.trim();
    let phone = document.getElementById("phone").value.trim();
    let location = document.getElementById("location").value;

    if(cart.length === 0) return showNotification("Cart is empty");
    if(name.length < 3) return showNotification("Enter valid name");
    if(!/^\d{10}$/.test(phone)) return showNotification("Invalid phone");
    if(location === "") return showNotification("Select location");

    processPayment(name, phone, location);
}

/* Process Order */
function processPayment(name, phone, location){

    let subtotal = 0, items = "";

    cart.forEach(item=>{
        subtotal += item.price * item.quantity;
        items += `<p>${item.name} x${item.quantity} - GH₵ ${item.price * item.quantity}</p>`;
    });

    let data = deliveryData[location];
    let total = subtotal + data.fee;
    let ref = "TXN" + Date.now();

    document.getElementById("paymentForm").style.display = "none";

    document.getElementById("receiptContainer").innerHTML = `
    <div class="receipt">
        <h2>✅ Order Confirmed</h2>

        <p><b>Name:</b> ${name}</p>
        <p><b>Phone:</b> ${phone}</p>
        <p><b>Location:</b> ${location}</p>
        <p><b>Branch:</b> ${data.branch}</p>

        <hr>
        ${items}
        <hr>

        <p>Subtotal: GH₵ ${subtotal}</p>
        <p>Delivery Fee: GH₵ ${data.fee}</p>

        <p><b>Total: GH₵ ${total}</b></p>

        <p>⏱️ Estimated Delivery Time: ${data.time} mins</p>

        <h3 id="status">🍳 Preparing your order...</h3>

        <p><b>Ref:</b> ${ref}</p>

        <button onclick="downloadPDF('${name}','${phone}','${location}','${total}','${ref}')">
        📄 Download Receipt
        </button>
    </div>
    `;

    startTracking();

    let msg = `🍔 Order
Name: ${name}
Phone: ${phone}
Location: ${location}
ETA: ${data.time} mins
Total: GH₵ ${total}`;

    window.open(`https://wa.me/233558627995?text=${encodeURIComponent(msg)}`);

    localStorage.removeItem("cart");
}

/* NAVIGATION WITH PIZZA LOADER */
function goToPage(url) {
    document.getElementById("loader").style.display = "flex";
    setTimeout(() => {
        window.location.href = url;
    }, 1500);
}

/* 📦 ORDER TRACKING */
function startTracking(){
    let status = document.getElementById("status");

    setTimeout(()=>{
        status.innerText = "🚚 On the way...";
    }, 5000);

    setTimeout(()=>{
        status.innerText = "✅ Delivered!";
    }, 10000);
}

/* PDF */
function downloadPDF(name, phone, location, total, ref){
    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();

    doc.text("Receipt", 20, 20);
    doc.text("Name: " + name, 20, 40);
    doc.text("Phone: " + phone, 20, 50);
    doc.text("Location: " + location, 20, 60);
    doc.text("Total: GH₵ " + total, 20, 70);
    doc.text("Ref: " + ref, 20, 80);

    doc.save("receipt.pdf");
}

</script>

<!-- PIZZA LOADER -->
<div id="loader">
  <div class="pizza"></div>
  <p>Delicious Bites...</p>
</div>

<!-- CUSTOM NOTIFICATION BAR -->
<div id="notificationBar" class="notification-bar">
    <span class="icon">🔔</span>
    <span id="notificationMessage"></span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</body>
</html>
